project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
  resources:
    - assets/**
    - robots.txt

website:
  title: "Tobias Recker"
  site-url: "https://tobiasrecker.github.io"
  description: "Research profile of Dr.-Ing. Tobias Recker, Postdoctoral Researcher in cooperative mobile multi-robot systems, mobile manipulation, and construction automation."
  favicon: assets/favicon.svg
  open-graph: true
  navbar:
    pinned: true
    logo: assets/favicon.svg
    left:
      - href: index.qmd
        text: Home
      - href: research.qmd
        text: Research
      - href: projects.qmd
        text: Projects
      - href: publications.qmd
        text: Publications
      - href: dissertation.qmd
        text: Dissertation
      - href: about.qmd
        text: About
      - href: contact.qmd
        text: Contact
    right:
      - icon: github
        href: https://github.com/TobiasRecker
        aria-label: GitHub
      - text: ORCID
        href: https://orcid.org/0000-0003-1632-0538
  page-footer:
    left: "© 2026 Dr.-Ing. Tobias Recker"
    center:
      - text: Privacy
        href: privacy.qmd
    right:
      - text: Institute
        href: https://www.match.uni-hannover.de/en/institute/team/tobias-recker
      - text: LinkedIn
        href: https://de.linkedin.com/in/tobias-recker-14349521b
      - text: Scopus
        href: https://www.scopus.com/authid/detail.uri?authorId=57216780652

lang: en

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    page-layout: full
    smooth-scroll: true
    link-external-newwindow: true
    link-external-icon: false
    anchor-sections: true

execute:
  freeze: auto
